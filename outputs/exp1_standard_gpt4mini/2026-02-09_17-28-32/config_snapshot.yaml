model:
  name: gpt-4o-mini
  platform: azure
  env_var: AZURE_OPENAI_KEY
  connection:
    endpoint: https://tuo-resource.openai.azure.com/
    api_version: 2024-12-01-preview
    deployment: gpt-4o-mini
  params:
    temperature: 0.0
    max_tokens: 2048
    top_p: 1.0
  max_retries: 5
  timeout: 60
  system_prompt: 'You are a SPARQL expert for Wikidata.

    Generate ONLY valid SPARQL query code.

    Do NOT include explanations, comments, code blocks, or any text.

    Output ONLY the query starting with SELECT or CONSTRUCT.

    '
  concurrency: 30
linking:
  method: rebel
  model_path: Babelscape/rebel-large
  device: -1
  use_wikidata_fallback: true
retrieval:
  k: 3
  index_path: data/processed/train_index.faiss
  metadata_path: data/processed/train_metadata.pkl
prompt:
  name: std
  strategy: base
  system_message: 'You are a SPARQL expert for Wikidata.


    CRITICAL RULES:

    1. **Yes/No Questions:** IF the question starts with "Did", "Was", "Were", "Is",
    "Are", or implies a boolean answer, you MUST use `ASK { ... }` instead of SELECT.

    2. **No Hardcoded Values:** NEVER write specific dates (e.g., "1964") unless explicitly
    mentioned in the question. Always retrieve the comparison value from the graph
    (e.g. `FILTER(?date < ?targetDate)`).

    3. **Output Format:** Generate ONLY the valid SPARQL query code. Do NOT include
    explanations, comments, code blocks (```), or any other text. Start directly with
    ASK, SELECT, or CONSTRUCT.

    '
  use_system_msg: true
  include_examples: true
  include_entities: true
  include_schema_hint: true
  custom_instruction: 'Output ONLY the SPARQL query (no markdown, no explanation):'
system:
  experiment_name: exp1_standard_gpt4mini
  seed: 42
  debug: false
  cache_dir: ~/.cache/huggingface/hub
dataset:
  name: casey-martin/qald_9_plus
  split: test
  language: en
  limit: 30
rag:
  index_path: data/processed/train_index.faiss
  metadata_path: data/processed/train_metadata.pkl
  encoder_model: all-MiniLM-L6-v2
validation:
  enable_validation: true
  enable_correction: false
  max_attempts: 3
  validate_execution: false
  self_consistency_samples: 1
  consistency_temperature: 0.7
