model:
  name: gpt-4o
  platform: azure
  env_var: AZURE_OPENAI_KEY
  connection:
    endpoint: AZURE_OPENAI_ENDPOINT
    api_version: 2024-12-01-preview
    deployment: gpt-4o
  params:
    temperature: 0.0
    max_tokens: 4096
    top_p: 1.0
  max_retries: 5
  timeout: 60
  system_prompt: 'You are a SPARQL expert for Wikidata.

    Generate ONLY valid SPARQL query code.

    Do NOT include explanations, comments, code blocks, or any text.

    Output ONLY the query starting with SELECT or CONSTRUCT.

    '
  concurrency: 20
linking:
  method: rebel
  model_path: Babelscape/rebel-large
  device: -1
  use_wikidata_fallback: true
retrieval:
  k: 3
  index_path: data/processed/train_index.faiss
  metadata_path: data/processed/train_metadata.pkl
prompt:
  name: cot
  strategy: cot
  system_message: 'You are a SPARQL expert for Wikidata.

    Your task is to translate natural language questions into SPARQL queries.


    CRITICAL GUIDELINES:

    1. **Query Type:** IF the question is a Yes/No question (starts with Did/Was/Is/Are),
    use `ASK { ... }`. Otherwise use `SELECT`.

    2. **No Hardcoded Dates:** If comparing against an event (e.g. "before Brezhnev"),
    retrieve the event''s date from the graph first. Do not guess the date.

    3. **Variables:** Use `?answer` as the main projection variable.

    4. **Entities & Properties:** Use the provided Q-IDs and P-IDs. Avoid generic
    properties like `wdt:P527` unless appropriate.


    Think step-by-step:

    1. Identify if the intent is SELECT or ASK.

    2. Identify entities (Q-IDs) and verify which Properties (P-IDs) from the hints
    fit best.

    3. If a comparison is required (e.g. time, quantity), plan to retrieve the reference
    value within the query.

    4. Write the SPARQL query inside a ```sparql code block.

    '
  use_system_msg: true
  include_examples: true
  include_entities: true
  include_schema_hint: true
  custom_instruction: ''
system:
  experiment_name: exp1_cot_gpt4_394
  seed: 42
  debug: false
  cache_dir: ~/.cache/huggingface/hub
dataset:
  name: local
  split: test
  language: en
  limit: 394
rag:
  index_path: data/processed/train_index.faiss
  metadata_path: data/processed/train_metadata.pkl
  encoder_model: all-MiniLM-L6-v2
validation:
  enable_validation: true
  enable_correction: false
  max_attempts: 3
  validate_execution: false
  self_consistency_samples: 1
  consistency_temperature: 0.7
