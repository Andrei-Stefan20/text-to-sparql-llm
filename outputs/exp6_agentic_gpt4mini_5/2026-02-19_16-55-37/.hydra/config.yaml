model:
  name: gpt-4o-mini
  platform: azure
  env_var: AZURE_OPENAI_KEY
  connection:
    endpoint: AZURE_OPENAI_ENDPOINT
    api_version: 2024-12-01-preview
    deployment: gpt-4o-mini
  params:
    temperature: 0.0
    max_tokens: 2048
    top_p: 1.0
  max_retries: 5
  timeout: 60
  system_prompt: 'You are a SPARQL expert for Wikidata.

    Generate ONLY valid SPARQL query code.

    Do NOT include explanations, comments, code blocks, or any text.

    Output ONLY the query starting with SELECT or CONSTRUCT.

    '
  concurrency: 30
linking:
  method: rebel
  model_path: Babelscape/rebel-large
  device: -1
  use_wikidata_fallback: true
retrieval:
  k: 3
  index_path: data/processed/train_index.faiss
  metadata_path: data/processed/train_metadata.pkl
prompt:
  name: agentic
  strategy: agentic
  system_message: 'You are an expert Wikidata SPARQL agent.

    Your goal is to answer the user question by constructing a valid SPARQL query.


    TOOLS:

    You have one tool: EXECUTE_SPARQL - run a SPARQL query on Wikidata to verify QIDs,
    P-IDs, and schema.


    RESPONSE FORMAT - use exactly one of these two formats:


    FORMAT A (exploratory step):

    THOUGHT: <explain what you need to verify>

    ACTION: EXECUTE_SPARQL

    sparql_start

    <your exploratory query>

    sparql_end


    FORMAT B (final answer):

    THOUGHT: <explain why the query is correct>

    FINAL_ANSWER:

    sparql_start

    <your complete query>

    sparql_end


    RULES:

    1. Never guess QIDs or P-IDs - always verify with EXECUTE_SPARQL first.

    2. Boolean questions (Is/Was/Did/Are) use ASK in FINAL_ANSWER.

    3. SELECT queries always use ?answer as main variable.

    4. Dates: use FILTER(YEAR(?date) > 1990).

    5. Do not use SERVICE wikibase:label in FINAL_ANSWER.

    6. Output only the format above, no extra text.


    Standard prefixes available: wd, wdt, p, ps, pq, rdfs, xsd.

    '
  max_steps: 5
  step_delay: 0.5
  include_examples: true
  include_entities: true
  include_schema_hint: true
system:
  experiment_name: exp6_agentic_gpt4mini_5
  seed: 42
  debug: false
  cache_dir: ~/.cache/huggingface/hub
dataset:
  name: local
  split: test
  language: en
  limit: 5
rag:
  index_path: data/processed/train_index.faiss
  metadata_path: data/processed/train_metadata.pkl
  encoder_model: all-MiniLM-L6-v2
validation:
  enable_validation: true
  enable_correction: false
  max_attempts: 3
  validate_execution: false
  self_consistency_samples: 1
  consistency_temperature: 0.7
