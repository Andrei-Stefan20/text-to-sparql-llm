model:
  name: gpt-4o-mini
  platform: azure
  env_var: AZURE_OPENAI_KEY
  connection:
    endpoint: https://tuo-resource.openai.azure.com/
    api_version: 2024-12-01-preview
    deployment: gpt-4o-mini
  params:
    temperature: 0.0
    max_tokens: 2048
  concurrency: 30
  timeout: 30
linking:
  method: rebel
  model_path: Babelscape/rebel-large
  device: -1
retrieval:
  k: 3
  index_path: data/processed/train_index.faiss
  metadata_path: data/processed/train_metadata.pkl
prompt:
  name: std
  use_system_msg: true
  include_examples: true
  include_entities: true
  include_schema_hint: false
  custom_instruction: Output ONLY the SPARQL query code.
system:
  experiment_name: final_check
  seed: 42
  debug: false
dataset:
  name: casey-martin/qald_9_plus
  split: train
  language: en
  limit: 1
rag:
  index_path: data/processed/train_index.faiss
  metadata_path: data/processed/train_metadata.pkl
  encoder_model: all-MiniLM-L6-v2
