# =====================================================
# Default Configuration File
# =====================================================
# This file defines the default settings for the system, including:
# - Model selection
# - Linking and retrieval strategies
# - Prompt configuration
# - Dataset and validation settings
#
# Modify these values to customize the behavior of the system.

defaults:
  - model: azure_gpt4_mini
  - linking: rebel
  - retrieval: 3shot
  - prompt: standard       
  - _self_

hydra:
  run:
    dir: outputs/${system.experiment_name}/${now:%Y-%m-%d_%H-%M-%S}

system:
  experiment_name: "param_test" 
  seed: 42
  debug: false
  cache_dir: ~/.cache/huggingface/hub

dataset:
  name: "local"
  split: "test"
  language: "en"
  limit: null               

rag:
  index_path: "data/processed/train_index.faiss"
  metadata_path: "data/processed/train_metadata.pkl"
  encoder_model: "all-MiniLM-L6-v2"


# Query Validation & Self-Correction Settings
validation:
  # Enable syntax validation (rdflib)
  enable_validation: true
  
  # Enable self-correction loop (retries with error feedback)
  enable_correction: false
  
  # Maximum correction attempts before giving up
  max_attempts: 3
  
  # Validate by executing query on Wikidata (slower, more accurate)
  # WARNING: This makes actual API calls to Wikidata
  validate_execution: false
  
  # Self-consistency: generate N queries and vote for best
  # Set to 1 to disable, >1 to enable (e.g., 3 or 5)
  self_consistency_samples: 1
  
  # Temperature for generating diverse samples in self-consistency
  consistency_temperature: 0.7