# =====================================================
# Linking Configuration: All Methods
# =====================================================
# This configuration enables all entity linking methods, including:
# - REBEL for relation extraction
# - RELIK for entity linking
# - Wikidata API fallback for unresolved entities
#
# Use this configuration for comprehensive entity linking workflows.

method: "all"
device: -1

# REBEL config
rebel_model_path: "Babelscape/rebel-large"

# RELIK config
relik_model_path: "sapienzanlp/relik-entity-linking-small"
window_size: 32

# Enable Wikidata API fallback for entities without QIDs
use_wikidata_fallback: true